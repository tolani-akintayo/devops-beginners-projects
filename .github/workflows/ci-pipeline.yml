name: Node.js CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  REGISTRY: docker.io
  IMAGE_NAME: devopsforjesus/devops-demo:v1.0.0

jobs:
  #  ---- JOB 1: LINT AND FORMAT CHECK ------------------------------
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint #need to run this: npm install --save-dev eslint npx eslint --init




