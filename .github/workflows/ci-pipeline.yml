name: Node.js CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  IMAGE_NAME: devopsforjesus/devops-demo

jobs:
  # ── JOB 1: LINT AND FORMAT CHECK ──────────────────────────────────
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint # need to run this: npm install --save-dev eslint npx eslint --init to get eslint.config.mjs file

  # ── JOB 2: TEST ───────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint                   # Only run if lint passes

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

 # ── JOB 3: SECURITY SCAN ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with: 
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm' 

      - run: npm ci
      
      - name: Audit dependencies
        run: npm audit --audit-level=critical

  # ── JOB 4: BUILD AND PUSH DOCKER IMAGE ─────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]       # Only build if BOTH test AND security pass

    steps:
      - uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@4
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          docker push ${{ env.IMAGE_NAME }}:latest

 
